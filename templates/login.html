<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hevile — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{ --laranja:#ff671f; --azul:#4f758b; --escuro:#222d33; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Work Sans', Arial, sans-serif;
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
  /* padrão de listras diagonais da marca */
  background: repeating-linear-gradient(135deg,
    var(--laranja) 0 18px, var(--azul) 18px 36px);
}
.box {
  background: white; border-radius: 16px; padding: 40px 36px; width: 380px; max-width: 92vw;
  box-shadow: 0 14px 50px rgba(0,0,0,.3);
}
.brand { margin-bottom: 26px; }
.brand .lockup { display: flex; align-items: baseline; gap: 10px; }
.brand .mark { color: var(--laranja); font-weight: 900; font-size: 2rem; line-height: 1; }
.brand .word { color: var(--escuro); font-weight: 900; font-size: 1.9rem; letter-spacing: 3px; }
.brand .tag {
  margin-top: 6px; font-size: .72rem; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--azul);
}
label { display: block; font-size: .85rem; color: #444; margin-bottom: 5px; margin-top: 14px; font-weight: 500; }
input {
  width: 100%; padding: 11px 13px; border: 1px solid #ddd; border-radius: 8px; font-size: .95rem;
  font-family: 'Work Sans', Arial, sans-serif;
}
input:focus { outline: none; border-color: var(--azul); box-shadow: 0 0 0 2px rgba(79,117,139,.2); }
button {
  width: 100%; margin-top: 24px; padding: 12px; border: none; border-radius: 8px;
  background: var(--laranja); color: white; font-size: .98rem; font-weight: 700; cursor: pointer;
  font-family: 'Work Sans', Arial, sans-serif; transition: background .15s;
}
button:hover { background: #e65c16; }
.erro {
  background: #fce8e6; color: #c5221f; font-size: .85rem; padding: 10px 12px;
  border-radius: 8px; margin-bottom: 14px;
}
</style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <div class="lockup"><span class="mark">&#187;</span><span class="word">HEVILE</span></div>
      <div class="tag">We deliver the best</div>
    </div>
    {% if erro %}<div class="erro">❌ {{ erro }}</div>{% endif %}
    <form method="POST" action="/login">
      <label>E-mail</label>
      <input type="email" name="email" placeholder="seuemail@hevile.com.br" autofocus required>
      <label>Senha</label>
      <input type="password" name="senha" placeholder="••••••••" required>
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
