<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hevile — Trocar senha</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap');
:root{ --azul:#3D6B8A; --laranja:#F15A24; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif; background: #EBEBEB; color: #333;
  display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;
}
.box {
  background: white; border-radius: 8px; padding: 36px; width: 400px; max-width: 100%;
  border-top: 4px solid var(--laranja);
  box-shadow: 0 6px 24px rgba(0,0,0,.12);
}
.brand { text-align: center; margin-bottom: 18px; }
.brand .hv-logo { height: 34px; width: auto; color: var(--azul); }
h1 { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: .04em;
  font-size: 1.2rem; margin-bottom: 4px; color: #333; text-align: center; }
p.sub { font-size: .85rem; color: #888; margin-bottom: 18px; text-align: center; }
label { display: block; font-size: .85rem; color: #444; margin-bottom: 5px; margin-top: 12px; font-weight: 500; }
input {
  width: 100%; padding: 11px 13px; border: 1px solid #ddd; border-radius: 6px; font-size: .95rem;
  font-family: 'DM Sans', sans-serif;
}
input:focus { outline: none; border-color: var(--azul); box-shadow: 0 0 0 2px rgba(61,107,138,.18); }
.btns { display: flex; gap: 10px; margin-top: 24px; }
button {
  flex: 1; padding: 12px; border: none; border-radius: 6px;
  background: var(--laranja); color: white; font-size: .96rem; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
button:hover { opacity: .9; }
a.cancel {
  flex: 1; padding: 12px; border-radius: 6px; background: #f0f0f0; color: #333;
  font-size: .96rem; font-weight: 600; text-align: center; text-decoration: none;
}
.erro { background: #fce8e6; color: #c5221f; font-size: .85rem; padding: 10px 12px; border-radius: 6px; margin-bottom: 14px; }
.aviso { background: #fff3ec; color: var(--laranja); font-size: .85rem; padding: 10px 12px; border-radius: 6px; margin-bottom: 14px; font-weight: 500; }
</style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <svg class="hv-logo" viewBox="0 0 410.5 100" xmlns="http://www.w3.org/2000/svg" aria-label="HEVILE"><polygon points="70.4,1.9 53.7,1.9 69.8,42.6 39.5,42.6 19.1,2.5 2.5,2.5 24.1,50.6 1.9,97.5 18.5,97.5 38.3,57.4 71.6,57.4 53.1,97.5 70.4,97.5 93.2,49.4" fill="currentColor"/><polygon points="100.0,1.9 100.0,97.5 161.7,97.5 161.7,82.7 116.7,82.1 117.3,57.4 157.4,56.8 157.4,42.0 117.3,42.0 116.7,17.9 161.1,17.3 161.1,1.9" fill="currentColor"/><polygon points="166.7,1.9 192.6,97.5 220.4,97.5 246.3,1.9 229.0,1.9 206.2,85.8 184.0,1.9" fill="currentColor"/><polygon points="251.9,1.9 251.9,98.1 267.9,98.1 268.5,1.9" fill="currentColor"/><polygon points="277.2,1.9 277.2,97.5 338.9,98.1 338.9,82.7 293.8,81.5 293.8,1.9" fill="currentColor"/><polygon points="345.7,1.9 345.7,97.5 407.4,97.5 407.4,82.7 362.3,82.1 363.0,57.4 403.1,56.8 403.1,42.0 363.6,42.0 362.3,17.9 406.8,17.3 406.8,1.9" fill="currentColor"/></svg>
    </div>
    <h1>Trocar senha</h1>
    <p class="sub">Defina uma senha pessoal e segura.</p>

    {% if forcado %}<div class="aviso">⚠️ Sua senha foi definida por um administrador. Crie a sua própria senha para continuar.</div>{% endif %}
    {% if erro %}<div class="erro">❌ {{ erro }}</div>{% endif %}

    <form method="POST" action="/trocar_senha">
      {% if not forcado %}
      <label>Senha atual</label>
      <input type="password" name="atual" placeholder="••••••••" required>
      {% endif %}
      <label>Nova senha</label>
      <input type="password" name="nova" placeholder="mínimo 6 caracteres" required autofocus>
      <label>Confirmar nova senha</label>
      <input type="password" name="conf" placeholder="repita a nova senha" required>
      <div class="btns">
        {% if not forcado %}<a class="cancel" href="/">Cancelar</a>{% endif %}
        <button type="submit">Salvar senha</button>
      </div>
    </form>
  </div>
</body>
</html>
